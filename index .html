<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬核五子棋對戰</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .container {
            text-align: center;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            gap: 1px;
            background-color: #d4a373;
            padding: 10px;
            border: 3px solid #8b5a2b;
            margin-bottom: 20px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: #e3b787;
            border: 1px solid #c49a6c;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .piece.black { background-color: #000; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
        .piece.white { background-color: #fff; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }

        button:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>五子棋 Gomoku</h1>
        <h2 id="status">現在輪到：黑子</h2>
        <div id="board"></div>
        <button id="restartBtn">重新開始</button>
    </div>

    <script>
        const boardSize = 15;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const restartBtn = document.getElementById('restartBtn');

        let currentPlayer = 'black';
        let board = [];
        let gameActive = true;

        function initGame() {
            boardElement.innerHTML = '';
            board = Array.from({ length: boardSize }, () => Array(boardSize).fill(null));
            currentPlayer = 'black';
            gameActive = true;
            statusElement.innerText = '現在輪到：黑子';

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', handleCellClick);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            const r = parseInt(e.target.dataset.row);
            const c = parseInt(e.target.dataset.col);

            if (board[r][c] !== null) return;

            board[r][c] = currentPlayer;
            const piece = document.createElement('div');
            piece.classList.add('piece', currentPlayer);
            e.target.appendChild(piece);

            if (checkWin(r, c)) {
                statusElement.innerText = `${currentPlayer === 'black' ? '黑子' : '白子'} 獲勝！`;
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            statusElement.innerText = `現在輪到：${currentPlayer === 'black' ? '黑子' : '白子'}`;
        }

        function checkWin(r, c) {
            const directions = [
                [1, 0], [0, 1], [1, 1], [1, -1]
            ];

            for (let [dr, dc] of directions) {
                let count = 1;
                
                // 往前查
                let nr = r + dr, nc = c + dc;
                while (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize && board[nr][nc] === currentPlayer) {
                    count++;
                    nr += dr; nc += dc;
                }
                
                // 往後查
                nr = r - dr; nc = c - dc;
                while (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize && board[nr][nc] === currentPlayer) {
                    count++;
                    nr -= dr; nc -= dc;
                }

                if (count >= 5) return true;
            }
            return false;
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
