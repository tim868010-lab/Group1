<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統啟動：每日運勢預測</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .result-box {
            min-height: 140px;
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .fortune-level {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 10px currentColor;
        }
        .fortune-desc {
            font-size: 16px;
            color: #ccc;
            line-height: 1.5;
        }
        button {
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #00b38f;
            box-shadow: 0 0 15px #00ffcc;
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ 系統連線 ] 運勢預測模組</h1>
        <div class="result-box">
            <div id="level" class="fortune-level">等待指令...</div>
            <div id="desc" class="fortune-desc">點擊下方按鈕開始存取運算數據</div>
        </div>
        <button id="drawBtn">執行抽取程序</button>
    </div>

    <script>
        const fortunes = [
            { level: "大吉", desc: "宜：單排競技。今天手感發燙，不管打 CS 還是 Valorant，準星就像裝了磁鐵，見神殺神！" },
            { level: "中吉", desc: "宜：研究硬體。今天是調整雙螢幕支架或保養機械鍵盤（特別是磁軸）的完美時機，手動組裝必定順利。" },
            { level: "小吉", desc: "宜：掛機看盤。美股 AI 科技股今晚或許會有不錯的波動，適合悠哉觀察，準備佈局。" },
            { level: "吉", desc: "宜：放鬆追番。寫 Code 或配線弄累了，來看幾集《Smiling Friends》或異世界動畫轉換一下心情。" },
            { level: "凶", desc: "忌：玩《Stoneshard》不存檔。系統偵測到今天很容易遭遇突發的翻車意外，請步步為營！" },
            { level: "大凶", desc: "忌：未經測試直接 Push 程式碼。今天很容易遇到邏輯 Bug，上傳前請務必再三檢查！" }
        ];

        const drawBtn = document.getElementById('drawBtn');
        const levelElement = document.getElementById('level');
        const descElement = document.getElementById('desc');

        drawBtn.addEventListener('click', () => {
            // 按下按鈕後的載入動畫感
            levelElement.innerText = "運算中...";
            levelElement.style.color = "#00ffcc";
            descElement.innerText = "正在分析伺服器數據...";
            drawBtn.disabled = true;
            drawBtn.innerText = "請稍候";

            // 假裝運算 1 秒鐘
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * fortunes.length);
                const result = fortunes[randomIndex];
                
                levelElement.innerText = result.level;
                
                // 根據吉凶改變顏色
                if(result.level === "大吉" || result.level === "中吉" || result.level === "吉") {
                    levelElement.style.color = "#ff4757"; // 大吉大利的亮紅色
                } else if (result.level === "小吉") {
                    levelElement.style.color = "#ffa502"; // 橘色
                } else {
                    levelElement.style.color = "#2ed573"; // 凶兆顯示詭異的綠色
                }

                descElement.innerText = result.desc;
                
                drawBtn.disabled = false;
                drawBtn.innerText = "重新抽取";
            }, 1000);
        });
    </script>
</body>
</html>
